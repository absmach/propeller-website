openapi: 3.0.0
info:
  title: Propeller
  version: 1.0.0
  description: ""
servers:
  - url: http://localhost:7070
paths:
  /proplets/{PROPLET_ID}:
    get:
      summary: Get Proplet
      responses: {}
      tags:
        - Manager
        - Proplets
    parameters:
      - name: PROPLET_ID
        in: path
        required: true
        schema:
          type: string
  /proplets:
    get:
      summary: List Proplets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          example: "1000"
      responses: {}
      tags:
        - Manager
        - Proplets
  /tasks:
    post:
      summary: Create Task
      responses: {}
      tags:
        - Manager
        - Task
        - Embedded
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example: |-
              {
                  "name": "main",
                  // "image_url": "docker.io/mrstevenyaga/add.wasm",
                  "file": "AGFzbQEAAAABBwFgAn9/AX8DAgEABwgBBG1haW4AAAoJAQcAIAAgAWoL",
                  "inputs": [
                      10,
                      20
                  ]
              }
    get:
      summary: List Tasks
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          example: "1000"
      responses: {}
      tags:
        - Manager
        - Task
  /tasks/{TASK_ID}:
    get:
      summary: Get Task
      responses: {}
      tags:
        - Manager
        - Task
        - Embedded
    parameters:
      - name: TASK_ID
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Update Task
      responses: {}
      tags:
        - Manager
        - Task
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  format: color
                inputs:
                  type: array
                  items:
                    type: integer
            example:
              name: add
              inputs:
                - 10
                - 20
    delete:
      summary: Delete Task
      responses: {}
      tags:
        - Manager
        - Task
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
            example:
              name: "{{$randomCompanyName}}"
  /tasks/{TASK_ID}/start:
    post:
      summary: Start Task
      responses: {}
      tags:
        - Manager
        - Task
        - Embedded
    parameters:
      - name: TASK_ID
        in: path
        required: true
        schema:
          type: string
  /tasks/{TASK_ID}/upload:
    put:
      summary: Upload Wasm File
      responses: {}
      tags:
        - Manager
        - Task
        - Host Runtime
    parameters:
      - name: TASK_ID
        in: path
        required: true
        schema:
          type: string
  /tasks/{TASK_ID}/stop:
    post:
      summary: Stop Task
      responses: {}
      tags:
        - Manager
        - Task
    parameters:
      - name: TASK_ID
        in: path
        required: true
        schema:
          type: string
  /fl/experiments:
    post:
      summary: Configure FL Experiment
      description: Configure a new federated learning experiment with model architecture, aggregation strategy, and privacy settings.
      responses:
        "201":
          description: Experiment configured successfully
        "400":
          description: Invalid configuration
      tags:
        - Federated Learning
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Experiment name
                model_architecture:
                  type: string
                  description: Neural network architecture
                aggregation_strategy:
                  type: string
                  enum: [fedavg, fedprox, byzantine_robust]
                  description: Aggregation algorithm
                min_participants:
                  type: integer
                  description: Minimum number of participants per round
                rounds:
                  type: integer
                  description: Total number of training rounds
            example:
              name: "mnist-classification"
              model_architecture: "cnn"
              aggregation_strategy: "fedavg"
              min_participants: 3
              rounds: 10
  /fl/task:
    get:
      summary: Get FL Task
      description: Retrieve the current federated learning task configuration and status.
      responses:
        "200":
          description: FL task details
        "404":
          description: No active FL task
      tags:
        - Federated Learning
  /fl/update:
    post:
      summary: Submit Model Update
      description: Submit a local model update from a participant after training on local data.
      responses:
        "200":
          description: Update received successfully
        "400":
          description: Invalid update format
      tags:
        - Federated Learning
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                participant_id:
                  type: string
                round_id:
                  type: string
                weights:
                  type: array
                  items:
                    type: number
                  description: Model weight updates
                metrics:
                  type: object
                  properties:
                    loss:
                      type: number
                    accuracy:
                      type: number
  /fl/update_cbor:
    post:
      summary: Submit Model Update (CBOR)
      description: Submit a local model update in CBOR format for efficient binary transmission.
      responses:
        "200":
          description: Update received successfully
        "400":
          description: Invalid CBOR payload
      tags:
        - Federated Learning
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: CBOR-encoded model update
  /fl/rounds/{ROUND_ID}/complete:
    get:
      summary: Check Round Completion
      description: Check if a federated learning round has completed with all participant updates.
      responses:
        "200":
          description: Round completion status
          content:
            application/json:
              schema:
                type: object
                properties:
                  complete:
                    type: boolean
                  participants_submitted:
                    type: integer
                  participants_required:
                    type: integer
        "404":
          description: Round not found
      tags:
        - Federated Learning
    parameters:
      - name: ROUND_ID
        in: path
        required: true
        schema:
          type: string
